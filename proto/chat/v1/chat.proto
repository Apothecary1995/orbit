syntax = "proto3";
package chat.v1;
option go_package = "github.com/Apothecary1995/cengsta-paradise/gen/chat/v1;chatpb";

service ChatService {
  rpc SendMessage(SendMessageRequest)               returns (SendMessageResponse);
  rpc GetHistory(GetHistoryRequest)                 returns (GetHistoryResponse);
  rpc GetConversations(GetConversationsRequest)     returns (GetConversationsResponse);
  rpc CreateConversation(CreateConversationRequest) returns (CreateConversationResponse);
  rpc MarkAsRead(MarkAsReadRequest)                 returns (MarkAsReadResponse);
  rpc GetMembers(GetMembersRequest)                 returns (GetMembersResponse);
  rpc EditMessage(EditMessageRequest)               returns (EditMessageResponse);
  rpc DeleteMessage(DeleteMessageRequest)           returns (DeleteMessageResponse);
  rpc CreateStory(CreateStoryRequest)               returns (CreateStoryResponse);
  rpc GetStories(GetStoriesRequest)                 returns (GetStoriesResponse);
}

message SendMessageRequest {
  string conversation_id = 1;
  string sender_id       = 2;
  string content         = 3;
  string type            = 4;
  string reply_to_id     = 5;
}
message SendMessageResponse   { string message_id = 1; string created_at = 2; }
message GetHistoryRequest     { string conversation_id = 1; int32 limit = 2; int32 offset = 3; }
message GetHistoryResponse    { repeated Message messages = 1; }
message MarkAsReadRequest     { string message_id = 1; string user_id = 2; }
message MarkAsReadResponse    { bool success = 1; }
message CreateConversationRequest {
  string type = 1; string name = 2; string created_by = 3; repeated string member_ids = 4;
}
message CreateConversationResponse { Conversation conversation = 1; }
message GetConversationsRequest    { string user_id = 1; }
message GetConversationsResponse   { repeated Conversation conversations = 1; }
message GetMembersRequest          { string conversation_id = 1; }
message GetMembersResponse         { repeated string member_ids = 1; }

message Message {
  string id = 1; string conversation_id = 2; string sender_id = 3;
  string type = 4; string content = 5; string status = 6;
  string reply_to_id = 7; string created_at = 8;
  string edited_at = 9; bool deleted = 10;
}
message Story {
  string id = 1; string user_id = 2; string type = 3;
  string content = 4; string caption = 5; int32 views = 6;
  string expires_at = 7; string created_at = 8;
}
message CreateStoryRequest   { string user_id = 1; string type = 2; string content = 3; string caption = 4; }
message CreateStoryResponse  { Story story = 1; }
message GetStoriesRequest    { repeated string user_ids = 1; }
message GetStoriesResponse   { repeated Story stories = 1; }

message EditMessageRequest   { string message_id = 1; string user_id = 2; string content = 3; }
message EditMessageResponse  { bool success = 1; string edited_at = 2; }
message DeleteMessageRequest { string message_id = 1; string user_id = 2; }
message DeleteMessageResponse{ bool success = 1; }

message Conversation {
  string id = 1; string type = 2; string name = 3;
  string avatar_url = 4; string created_by = 5; string created_at = 6;
}