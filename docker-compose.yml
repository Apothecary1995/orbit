services:

  # ── PostgreSQL ──────────────────────────────────────────
  # Ana veritabanı — kullanıcılar, mesajlar, gruplar burada saklanır
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cengsta
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: cengsta_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cengsta -d cengsta_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  # Online durumu, oturum token'ları, pub/sub mesaj dağıtımı
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass secret
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ────────────────────────────────────────────
  # Async kuyruk — bildirimler, okundu bilgisi, grup mesajları
  # management tag'i = web arayüzü dahil (localhost:15672)
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    ports:
      - "5672:5672"     # uygulama bağlantısı
      - "15672:15672"   # web UI
    environment:
      RABBITMQ_DEFAULT_USER: cengsta
      RABBITMQ_DEFAULT_PASS: secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── MinIO ───────────────────────────────────────────────
  # Kendi sunucunda çalışan dosya deposu — resim, video, belge
  # S3 ile birebir uyumlu API — ileride Cloudflare CDN'e bağlanır
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # web UI
    environment:
      MINIO_ROOT_USER: cengsta
      MINIO_ROOT_PASSWORD: secret123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Jaeger ──────────────────────────────────────────────
  # Distributed tracing — hangi servis kaç ms harcadı görürsün
  # all-in-one: collector + query + UI hepsi tek container
  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "16686:16686"   # web UI
      - "4317:4317"     # OTLP gRPC (servisler buraya trace gönderir)
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"


  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data: