services:

  # ════════════════════════════════════════
  #  ALTYAPI (Infrastructure)
  # ════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-cengsta}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB:       ${DB_NAME:-cengsta_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cengsta} -d ${DB_NAME:-cengsta_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - orbit-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - orbit-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-cengsta}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-secret}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - orbit-net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-cengsta}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-secret123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - orbit-net

  # MinIO bucket'ını oluştur
  minio-init:
    image: minio/mc:latest
    restart: no
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-cengsta}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-secret123}
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/orbit-files &&
        mc anonymous set download local/orbit-files &&
        echo 'MinIO hazır.'
      "
    networks:
      - orbit-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - orbit-net

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - orbit-net

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - orbit-net

  # ════════════════════════════════════════
  #  UYGULAMA SERVİSLERİ
  # ════════════════════════════════════════

  auth-svc:
    build:
      context: .
      dockerfile: services/auth-svc/Dockerfile
    restart: unless-stopped
    environment:
      AUTH_GRPC_PORT: ":50051"
      DB_HOST:        postgres
      DB_PORT:        "5432"
      DB_USER:        ${DB_USER:-cengsta}
      DB_PASSWORD:    ${DB_PASSWORD:-secret}
      DB_NAME:        ${DB_NAME:-cengsta_db}
      REDIS_ADDR:     redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      JWT_SECRET:     ${JWT_SECRET:?JWT_SECRET env var zorunlu}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orbit-net

  chat-svc:
    build:
      context: .
      dockerfile: services/chat-svc/Dockerfile
    restart: unless-stopped
    environment:
      CHAT_GRPC_PORT: ":50052"
      DB_HOST:        postgres
      DB_PORT:        "5432"
      DB_USER:        ${DB_USER:-cengsta}
      DB_PASSWORD:    ${DB_PASSWORD:-secret}
      DB_NAME:        ${DB_NAME:-cengsta_db}
      REDIS_ADDR:     redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orbit-net

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    environment:
      GATEWAY_HTTP_PORT: ":8080"
      AUTH_SVC_ADDR:     auth-svc:50051
      CHAT_SVC_ADDR:     chat-svc:50052
      DB_HOST:           postgres
      DB_PORT:           "5432"
      DB_USER:           ${DB_USER:-cengsta}
      DB_PASSWORD:       ${DB_PASSWORD:-secret}
      DB_NAME:           ${DB_NAME:-cengsta_db}
      REDIS_ADDR:        redis:6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD:-secret}
      JWT_SECRET:        ${JWT_SECRET:?JWT_SECRET env var zorunlu}
      MINIO_PUBLIC_URL:  ${MINIO_PUBLIC_URL:-http://localhost:9000/orbit-files}
      ALLOWED_ORIGIN:    ${ALLOWED_ORIGIN:-http://localhost:5173}
      VAPID_PUBLIC_KEY:  ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT:     ${VAPID_SUBJECT:-mailto:admin@example.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-svc:
        condition: service_started
      chat-svc:
        condition: service_started
    networks:
      - orbit-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    networks:
      - orbit-net

  # ════════════════════════════════════════
  #  REVERSE PROXY (Nginx)
  # ════════════════════════════════════════
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - api-gateway
    networks:
      - orbit-net

networks:
  orbit-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:
