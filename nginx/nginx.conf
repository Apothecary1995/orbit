worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # ── Temel ayarlar ──────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript;

    # ── Rate limiting ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ── Upstream servisler ─────────────────────────────────
    upstream frontend  { server frontend:5173; }
    upstream api       { server api-gateway:8080; }

    # ── HTTP → HTTPS yönlendirme ───────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Ana server ─────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Güvenlik header'ları
        add_header X-Frame-Options              "DENY" always;
        add_header X-Content-Type-Options       "nosniff" always;
        add_header X-XSS-Protection             "1; mode=block" always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss:; frame-ancestors 'none';" always;

        # ── Frontend (statik dosyalar) ──────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # ── API endpoint'leri ───────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass       http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Auth endpoint'leri — daha sıkı limit ───────────
        location /api/v1/auth/login {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass       http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/auth/register {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass       http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── WebSocket ───────────────────────────────────────
        location /ws {
            proxy_pass              http://api;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade    $http_upgrade;
            proxy_set_header        Connection "upgrade";
            proxy_set_header        Host       $host;
            proxy_read_timeout      86400s;
            proxy_send_timeout      86400s;
        }

        # ── Health check ────────────────────────────────────
        location /health {
            proxy_pass http://api;
            access_log off;
        }
    }
}
